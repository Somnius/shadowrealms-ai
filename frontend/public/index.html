<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="%PUBLIC_URL%/favicon-64.png" />
    <link rel="apple-touch-icon" sizes="64x64" href="%PUBLIC_URL%/favicon-64.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f1729" />
    <meta
      name="description"
      content="ShadowRealms AI - AI-Powered Tabletop RPG Platform"
    />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- Critical paint: match app dark shell before bundled CSS/fonts finish -->
    <style>
      html { background-color: #0f0f1e; color-scheme: dark; }
      body {
        margin: 0;
        background-color: #0f0f1e;
        color: #e5e5e5;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      #root { min-height: 100vh; }
    </style>
    <!-- Load webfonts in head (avoid @import inside CSS — reduces FOUC and layout thrash) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&amp;family=Crimson+Text:ital,wght@0,400;0,600;1,400&amp;family=Inter:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@300;400;500;600;700&amp;display=swap"
    />
    <!-- Single FA load (was duplicated via gothic-theme @import); newer build may reduce Firefox glyph warnings -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>ShadowRealms AI</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
